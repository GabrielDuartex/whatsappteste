<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aniversários · WhatsApp Bot</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #14121d; --bg2: #1a1726; --surface: #211d33; --surface-2: #2a2540;
    --line: #342e4d; --pink: #ff5d8f; --gold: #ffce5c; --text: #ece9f5;
    --muted: #918bab; --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Inter", system-ui, sans-serif;
    background: radial-gradient(1200px 600px at 80% -10%, #2a1d3a 0%, transparent 60%),
                radial-gradient(900px 500px at -10% 110%, #1d2a3a 0%, transparent 55%), var(--bg);
    color: var(--text); min-height: 100vh; line-height: 1.5;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 32px 20px 80px; }
  header { margin-bottom: 28px; }
  .eyebrow { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); font-weight: 600; margin-bottom: 8px; }
  h1 { font-family: "Sora", sans-serif; font-weight: 800; font-size: clamp(28px, 6vw, 40px); line-height: 1.05; letter-spacing: -0.02em; }
  h1 .cake { color: var(--gold); }
  .sub { color: var(--muted); margin-top: 8px; font-size: 15px; }
  .status { display: flex; align-items: center; gap: 10px; margin-top: 18px; padding: 12px 16px; border: 1px solid var(--line); border-radius: 12px; background: var(--surface); font-size: 14px; font-weight: 500; }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex: none; }
  .dot.on { background: #38d39f; box-shadow: 0 0 10px #38d39f; }
  .dot.off { background: var(--gold); box-shadow: 0 0 10px var(--gold); }
  .card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 22px; margin-top: 20px; }
  .card h2 { font-family: "Sora", sans-serif; font-size: 17px; font-weight: 700; margin-bottom: 16px; }
  .form-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
  .row { display: grid; grid-template-columns: 1fr 1fr 1.2fr; gap: 12px; }
  label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 6px; font-weight: 500; }
  input { width: 100%; padding: 11px 13px; font-size: 15px; font-family: inherit; background: var(--bg2); border: 1px solid var(--line); border-radius: 10px; color: var(--text); transition: border-color .15s; }
  input:focus { outline: none; border-color: var(--pink); }
  input::placeholder { color: #5b5675; }
  .btn { font-family: inherit; font-size: 15px; font-weight: 600; cursor: pointer; border: none; border-radius: 10px; padding: 12px 18px; transition: transform .08s, filter .15s; }
  .btn:active { transform: translateY(1px); }
  .btn-primary { background: var(--pink); color: #1a0d14; width: 100%; }
  .btn-primary:hover { filter: brightness(1.07); }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--line); font-size: 13px; padding: 9px 14px; }
  .btn-ghost:hover { color: var(--text); border-color: var(--pink); }
  .toolbar { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
  .person { display: flex; align-items: center; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--line); }
  .person:last-child { border-bottom: none; }
  .avatar { width: 44px; height: 44px; border-radius: 12px; flex: none; display: grid; place-items: center; font-weight: 700; font-size: 17px; font-family: "Sora", sans-serif; color: #1a0d14; background: linear-gradient(135deg, var(--pink), var(--gold)); }
  .person .info { flex: 1; min-width: 0; }
  .person .nome { font-weight: 600; font-size: 15px; }
  .person .data { color: var(--muted); font-size: 13px; }
  .pill { font-size: 12px; font-weight: 600; padding: 5px 11px; border-radius: 999px; background: var(--surface-2); color: var(--muted); white-space: nowrap; }
  .pill.soon { background: rgba(255,93,143,.16); color: var(--pink); }
  .pill.today { background: var(--gold); color: #2a1d00; }
  .del { background: none; border: none; cursor: pointer; color: #5b5675; font-size: 20px; padding: 4px 8px; border-radius: 8px; line-height: 1; }
  .del:hover { color: var(--pink); background: var(--surface-2); }
  .empty { color: var(--muted); text-align: center; padding: 30px 10px; font-size: 14px; }
  @media (max-width: 480px) { .row { grid-template-columns: 1fr 1fr; } .row .full { grid-column: 1 / -1; } }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="eyebrow">WhatsApp Bot · CallMeBot</div>
      <h1>Lembrete de aniversários <span class="cake">🎂</span></h1>
      <p class="sub">Cadastre as pessoas e o bot te avisa no WhatsApp todo dia que chegar um aniversário.</p>
      <div class="status" id="status"><span class="dot off"></span><span id="statusText">Verificando…</span></div>
    </header>

    <div class="card">
      <h2>Adicionar pessoa</h2>
      <div class="form-grid">
        <div>
          <label for="nome">Nome</label>
          <input id="nome" placeholder="Ex: Maria Souza" />
        </div>
        <div class="row">
          <div><label for="dia">Dia</label><input id="dia" type="number" min="1" max="31" placeholder="15" /></div>
          <div><label for="mes">Mês</label><input id="mes" type="number" min="1" max="12" placeholder="08" /></div>
          <div class="full"><label for="ano">Ano <span style="opacity:.6">(opcional)</span></label><input id="ano" type="number" min="1900" max="2025" placeholder="1995" /></div>
        </div>
        <button class="btn btn-primary" onclick="adicionar()">Adicionar aniversário</button>
      </div>
      <div class="toolbar">
        <button class="btn btn-ghost" onclick="testar()">Enviar teste pra mim</button>
        <button class="btn btn-ghost" onclick="checarAgora()">Checar aniversários agora</button>
      </div>
    </div>

    <div class="card">
      <h2>Próximos aniversários</h2>
      <div id="lista"><div class="empty">Carregando…</div></div>
    </div>
  </div>

<script>
const MESES = ["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];

async function carregarStatus() {
  try {
    const s = await (await fetch("/api/status")).json();
    const dot = document.querySelector("#status .dot");
    const txt = document.getElementById("statusText");
    if (s.configurado) { dot.className = "dot on"; txt.textContent = "CallMeBot configurado ✅"; }
    else { dot.className = "dot off"; txt.textContent = "Falta configurar CALLMEBOT_PHONE e CALLMEBOT_APIKEY"; }
  } catch (e) {}
}

async function carregarLista() {
  const lista = await (await fetch("/api/birthdays")).json();
  const el = document.getElementById("lista");
  if (!lista.length) { el.innerHTML = `<div class="empty">Ninguém cadastrado ainda. Adicione a primeira pessoa acima! 🎈</div>`; return; }
  el.innerHTML = lista.map((p) => {
    const inicial = p.nome.trim().charAt(0).toUpperCase();
    const dataTxt = `${String(p.dia).padStart(2,"0")} de ${MESES[p.mes-1]}` + (p.ano ? ` · ${p.ano}` : "");
    let pill, cls = "pill";
    if (p.diasAte === 0) { pill = "É hoje! 🎉"; cls += " today"; }
    else if (p.diasAte === 1) { pill = "amanhã"; cls += " soon"; }
    else if (p.diasAte <= 7) { pill = `em ${p.diasAte} dias`; cls += " soon"; }
    else { pill = `em ${p.diasAte} dias`; }
    return `<div class="person">
      <div class="avatar">${inicial}</div>
      <div class="info"><div class="nome">${escapeHtml(p.nome)}</div><div class="data">${dataTxt}</div></div>
      <span class="${cls}">${pill}</span>
      <button class="del" title="Remover" onclick="remover('${p.id}')">×</button>
    </div>`;
  }).join("");
}

async function adicionar() {
  const nome = document.getElementById("nome").value.trim();
  const dia = document.getElementById("dia").value;
  const mes = document.getElementById("mes").value;
  const ano = document.getElementById("ano").value;
  if (!nome || !dia || !mes) { alert("Preencha pelo menos nome, dia e mês."); return; }
  const r = await fetch("/api/birthdays", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ nome, dia, mes, ano: ano || null }) });
  if (r.ok) {
    ["nome","dia","mes","ano"].forEach(id => document.getElementById(id).value = "");
    carregarLista();
  } else { alert((await r.json()).erro || "Erro ao adicionar."); }
}

async function remover(id) {
  if (!confirm("Remover esta pessoa?")) return;
  await fetch("/api/birthdays/" + id, { method: "DELETE" });
  carregarLista();
}

async function testar() {
  const r = await fetch("/api/test", { method: "POST" });
  const d = await r.json();
  alert(r.ok ? "Mensagem de teste enviada! Confere seu WhatsApp." : (d.erro || "Erro."));
}

async function checarAgora() {
  const r = await fetch("/api/check-now", { method: "POST" });
  const d = await r.json();
  if (r.ok) alert(d.enviados ? `Pronto! ${d.enviados} aviso(s) enviado(s).` : "Ninguém faz aniversário hoje.");
  else alert(d.erro || "Erro ao checar.");
}

function escapeHtml(s) { return s.replace(/[&<>"']/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c])); }

carregarStatus(); carregarLista();
</script>
</body>
</html>
